<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Khushi ❤️</title>

<!-- CSS yahan aayegi -->
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#ff4d6d,#ff8fab,#7b2cbf,#4361ee);
background-size:400% 400%;
animation:bg 10s ease infinite;
font-family:Arial,sans-serif;
overflow:hidden;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{
width:90%;
max-width:380px;
padding:30px;
background:rgba(255,255,255,.18);
backdrop-filter:blur(15px);
border-radius:20px;
text-align:center;
color:white;
box-shadow:0 10px 30px rgba(0,0,0,.3);
transition:0.4s;
}

h1{
margin-bottom:20px;
}

#typing{
min-height:60px;
margin-bottom:20px;
}

button{
padding:12px 25px;
border:none;
border-radius:30px;
background:white;
color:#ff4d6d;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

#message{
display:none;
opacity:0;
transform:translateY(20px);
transition:all .6s ease;
margin-top:20px;
padding:15px;
background:white;
color:#333;
border-radius:15px;
}
#hearts{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;
}

.heart{
position:absolute;
bottom:-30px;
font-size:24px;
animation:fly 6s linear forwards;
}

@keyframes fly{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-120vh);
opacity:0;
}
}
#balloons{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;
}

.balloon{
position:absolute;
bottom:-80px;
font-size:40px;
animation:balloonFly 10s linear forwards;
}

@keyframes balloonFly{
0%{
transform:translateY(0);
}
100%{
transform:translateY(-120vh);
}
}
.showMessage{
display:block !important;
opacity:1 !important;
transform:translateY(0) !important;
}

.card{
transition:transform .4s ease;
animation:welcome 1.2s ease;
}

.card.pop{
transform:scale(1.03);
}
.card:hover{

transform:translateY(-8px) scale(1.03);

box-shadow:0 20px 50px rgba(0,0,0,.35);

}
#sparkles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;
}

.sparkle{
position:absolute;
font-size:18px;
animation:sparkleMove 3s linear forwards;
}

@keyframes sparkleMove{

0%{
opacity:1;
transform:scale(0.5);
}

100%{
opacity:0;
transform:scale(1.8) translateY(-120px);
}

}
.firework{

position:fixed;

font-size:28px;

animation:boom 1.5s ease forwards;

pointer-events:none;

}

@keyframes boom{

0%{

opacity:1;

transform:scale(.3);

}

100%{

opacity:0;

transform:scale(2.5);

}

}
@keyframes welcome{

0%{
opacity:0;
transform:scale(.6) rotate(-8deg);
}

60%{
transform:scale(1.08);
}

100%{
opacity:1;
transform:scale(1);
}

}
</style>

</head>

<body>

<div id="hearts"></div>

<div id="balloons"></div>

<div id="sparkles"></div>

<div id="fireworks"></div>

<div class="card">

<h1>🎂 Happy Birthday Khushi 🎂</h1>

<h3 style="margin-top:10px;">
✨ Have the Best Day Ever ✨
</h3>

<p id="typing"></p>

<button id="surpriseBtn">
🎁 Open Surprise
</button>

<div id="message">

<h2>💖 Dear Khushi 💖</h2>

<p>
Wishing you endless happiness, success,
good health and beautiful memories.

May your smile always stay the same.

Happy Birthday ❤️🎂
</p>

</div>

</div>

<!-- JavaScript yahan aayegi -->
<script>

const text = "Wishing you a day full of happiness, smiles and beautiful memories ❤️";
let i = 0;

function typeWriter() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter, 50);
  }
}

typeWriter();

document.getElementById("surpriseBtn").onclick = function () {
document.getElementById("message").classList.add("showMessage");

document.querySelector(".card").classList.add("pop");

document.getElementById("surpriseBtn").style.display="none";
document.getElementById("surpriseBtn").disabled = true;

createConfetti();
};
function createHeart(){

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"%";

heart.style.fontSize=(15+Math.random()*20)+"px";

heart.style.animationDuration=(4+Math.random()*4)+"s";

document.getElementById("hearts").appendChild(heart);

setTimeout(function(){

heart.remove();

},8000);

}

setInterval(createHeart,400);
function createBalloon(){

const balloon=document.createElement("div");

balloon.className="balloon";

balloon.innerHTML="🎈";

balloon.style.left=Math.random()*100+"%";

document.getElementById("balloons").appendChild(balloon);

setTimeout(function(){
balloon.remove();
},10000);

}

setInterval(createBalloon,1200);
function createSparkle(){

const s=document.createElement("div");

s.className="sparkle";

s.innerHTML="✨";

s.style.left=Math.random()*100+"%";

s.style.top=Math.random()*100+"%";

document.getElementById("sparkles").appendChild(s);

setTimeout(function(){

s.remove();

},3000);

}

setInterval(createSparkle,500);
function createConfetti(){

for(let i=0;i<30;i++){

const c=document.createElement("div");

c.innerHTML="🎉";

c.style.position="fixed";
c.style.left=Math.random()*100+"vw";
c.style.top="-20px";
c.style.fontSize=(15+Math.random()*20)+"px";
c.style.transition="all 3s linear";
c.style.pointerEvents="none";

document.body.appendChild(c);

setTimeout(function(){

c.style.top="110vh";
c.style.transform="rotate(720deg)";

},50);

setTimeout(function(){

c.remove();

},3200);

}

}
function firework(){

const f=document.createElement("div");

f.className="firework";

f.innerHTML="🎆";

f.style.left=Math.random()*100+"vw";

f.style.top=Math.random()*80+"vh";

document.body.appendChild(f);

setTimeout(function(){

f.remove();

},1500);

}

setInterval(firework,2000);
</script>

</body>
</html>
